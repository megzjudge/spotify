<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Megan Judge’s Spotify Playlists</title>
  <meta name="description" content="Browse and explore live Spotify podcasts and playlists.">
  <meta name="author" content="Megan Judge">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#191414">
  <meta property="og:title" content="Megan Judge’s Spotify">
  <meta property="og:description" content="Live Spotify podcasts and playlists.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_AU">
  <link rel="icon" type="image/png" href="https://spotify.jdge.cc/images/playlists_icon.png">
  <link rel="canonical" href="https://spotify.jdge.cc/">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>

<body>

  <header>
    <div class="container-header">
      <div class="brand">
        <h1>Megan Judge’s Spotify</h1>
      </div>

      <button id="refreshButton" class="primary-button" type="button">
        <span class="button-label-default">Refresh from Spotify</span>
        <span class="button-label-loading">Refreshing…</span>
      </button>
    </div>
  </header>

  <main id="appMain"></main>

  <footer>
    <div class="container-footer">
      <p class="footer-left">
        Live data pulled from Spotify Web API via Cloudflare Pages Functions - see Github 
        <a href="https://github.com/megzjudge/spotify" target="_blank" rel="noopener noreferrer">here</a>.
      </p>
      <p class="footer-copy">© Megan Judge</p>
    </div>
  </footer>

</body>
</html>
